# =============================================================================
# Softconnect Manager — CI/CD Pipeline PRODUÇÃO
# Trigger 1: push na branch `main`  → publica tag `latest` + `prod-<sha>`
# Trigger 2: push de tag `v*.*.*`   → publica tags semver: `1.2.3`, `1.2`, `1`, `latest`
# Ação: build imagem Docker → push GHCR
# Deploy: manual via Portainer (Stacks → softconnect-manager-prod → Update → Re-pull image)
# Subdomínio: manager.hub.softconnect.net.br
# =============================================================================

name: Deploy → Produção

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    paths:
      - '**'
      - '!ignored-docs/**'
      - '!docs/**'

jobs:
  build-and-push:
    name: Build & Push (prod)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lógica de tags geradas:
      # ┌─────────────────────────────────────────────────────────────────┐
      # │  Evento           │  Tags publicadas no GHCR                    │
      # ├─────────────────────────────────────────────────────────────────┤
      # │  push na main     │  latest  +  prod-abc1234                    │
      # │  tag v1.2.3       │  1.2.3   +  1.2  +  1  +  latest           │
      # └─────────────────────────────────────────────────────────────────┘
      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/softconnect-manager
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest
            type=sha,prefix=prod-,format=short

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_NAME=Softconnect Manager
            NEXT_PUBLIC_SOFTCOM_URL=https://www.softcomtecnologia.com.br
          no-cache: true

      - name: Resumo
        run: |
          IS_TAG=${{ startsWith(github.ref, 'refs/tags/') }}
          VERSION="${{ github.ref_name }}"
          echo "## ✅ Imagem de Produção publicada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$IS_TAG" = "true" ]; then
            echo "### 🏷️ Release versionada: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
            echo "Tags publicadas:" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/${{ github.repository_owner }}/softconnect-manager:${VERSION#v}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/${{ github.repository_owner }}/softconnect-manager:latest\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 🔄 Build contínuo da branch \`main\`" >> $GITHUB_STEP_SUMMARY
            echo "Tags publicadas:" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/${{ github.repository_owner }}/softconnect-manager:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/${{ github.repository_owner }}/softconnect-manager:prod-$(echo ${{ github.sha }} | cut -c1-7)\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 👉 Próximo passo — deploy manual" >> $GITHUB_STEP_SUMMARY
          echo "1. Acesse o Portainer" >> $GITHUB_STEP_SUMMARY
          echo "2. Stacks → \`softconnect-manager-prod\`" >> $GITHUB_STEP_SUMMARY
          echo "3. **Update the stack** → marque ✅ Re-pull image → **Deploy**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagem:** \`ghcr.io/${{ github.repository_owner }}/softconnect-manager:latest\`" >> $GITHUB_STEP_SUMMARY
